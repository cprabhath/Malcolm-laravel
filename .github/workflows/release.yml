name: Tag & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver without v prefix (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      notes_suffix:
        description: "Release notes suffix (e.g. 1.0.0-GA)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    name: Create tag and GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version, tag, and release notes file
        id: vars
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NOTES_SUFFIX="${{ github.event.inputs.notes_suffix }}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION (expected x.y.z)"
            exit 1
          fi

          if [[ -n "$NOTES_SUFFIX" ]]; then
            NOTES_FILE="docs/RELEASE-NOTES-${NOTES_SUFFIX}.md"
          else
            # Try both naming patterns
            if [[ -f "docs/RELEASE-NOTES-${VERSION}.md" ]]; then
              NOTES_FILE="docs/RELEASE-NOTES-${VERSION}.md"
            elif [[ -f "docs/RELEASE-NOTES-${VERSION}-GA.md" ]]; then
              NOTES_FILE="docs/RELEASE-NOTES-${VERSION}-GA.md"
            else
              NOTES_FILE="docs/RELEASE-NOTES-${VERSION}.md"
            fi
          fi

          TAG="v$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

          echo "Using tag: $TAG"
          echo "Using release notes: $NOTES_FILE"
          echo "Release notes file exists: $(test -f "$NOTES_FILE" && echo 'YES' || echo 'NO')"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag if missing
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on origin"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created and pushed $TAG"
          fi

      - name: Validate release notes file
        run: |
          test -f "${{ steps.vars.outputs.notes_file }}" || {
            echo "${{ steps.vars.outputs.notes_file }} not found"
            exit 1
          }

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Site Release ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.vars.outputs.notes_file }}
          draft: false
          prerelease: false
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}